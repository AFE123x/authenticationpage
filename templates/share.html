<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Sharing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        header h1 {
            color: #333;
            font-size: 28px;
        }
        
        header .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-badge {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .logout-btn:hover {
            background: #c82333;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .section {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        
        .upload-area.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        
        .upload-area input[type="file"] {
            display: none;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .upload-text {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .upload-subtext {
            color: #666;
            font-size: 14px;
        }
        
        .file-input-wrapper {
            margin-top: 20px;
        }
        
        .file-input-label {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 14px;
            font-weight: 600;
        }
        
        .file-input-label:hover {
            background: #764ba2;
        }
        
        .upload-progress {
            margin-top: 20px;
            display: none;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        
        .upload-status {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .documents-list {
            margin-top: 20px;
        }
        
        .document-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        
        .document-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }
        
        .document-info {
            flex: 1;
        }
        
        .document-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            word-break: break-word;
        }
        
        .document-meta {
            font-size: 12px;
            color: #999;
        }
        
        .document-size {
            display: inline-block;
            margin-right: 15px;
        }
        
        .document-date {
            display: inline-block;
        }
        
        .document-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-download {
            background: #667eea;
            color: white;
        }
        
        .btn-download:hover {
            background: #5568d3;
        }
        
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        
        .btn-delete:hover {
            background: #c82333;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .empty-state-text {
            font-size: 16px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            border-left: 4px solid #667eea;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 Document Sharing</h1>
            <div class="user-info">
                <div class="user-badge" id="username-badge">Loading...</div>
                <form action="/logout" method="post" style="margin: 0;">
                    <button type="submit" class="logout-btn">Logout</button>
                </form>
            </div>
        </header>
        
        <div id="alerts"></div>
        
        <div class="main-content">
            <!-- Upload Section -->
            <div class="section">
                <h2>Upload Document</h2>
                
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📤</div>
                    <div class="upload-text">Drag and drop your file here</div>
                    <div class="upload-subtext">or click to browse</div>
                    <input type="file" id="fileInput">
                    <div class="file-input-wrapper">
                        <label for="fileInput" class="file-input-label">Choose File</label>
                    </div>
                </div>
                
                <div class="upload-progress" id="uploadProgress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="upload-status" id="uploadStatus"></div>
                </div>
            </div>
            
            <!-- Stats Section -->
            <div class="section">
                <h2>Your Documents</h2>
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="totalDocuments">0</div>
                        <div class="stat-label">Total Documents</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="totalSize">0 B</div>
                        <div class="stat-label">Total Size</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="recentCount">0</div>
                        <div class="stat-label">Recent (24h)</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Documents List Section -->
        <div class="section">
            <h2>Shared Documents</h2>
            <div id="documentsList" class="documents-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <div class="empty-state-text">No documents uploaded yet. Start by uploading your first document!</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // API configuration
        const API_BASE = '';
        
        // Document list storage
        let documents = [];
        
        // Initialize the page
        async function initializePage() {
            try {
                // Load username from cookie or session
                const username = await fetchUsername();
                if (username) {
                    document.getElementById('username-badge').textContent = `👤 ${username}`;
                } else {
                    window.location.href = '/';
                }
                
                // Load documents
                await loadDocuments();
            } catch (error) {
                showAlert('Error initializing page: ' + error.message, 'error');
            }
        }
        
        // Fetch current username
        async function fetchUsername() {
            try {
                const response = await fetch(`${API_BASE}/api/user`, {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    return data.username;
                }
                return null;
            } catch (error) {
                console.error('Error fetching username:', error);
                return null;
            }
        }
        
        // Load documents list
        async function loadDocuments() {
            try {
                const response = await fetch(`${API_BASE}/api/documents`, {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    documents = await response.json();
                    renderDocuments();
                    updateStats();
                } else if (response.status === 401) {
                    window.location.href = '/';
                }
            } catch (error) {
                showAlert('Error loading documents: ' + error.message, 'error');
            }
        }
        
        // Render documents list
        function renderDocuments() {
            const listContainer = document.getElementById('documentsList');
            
            if (documents.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-text">No documents uploaded yet. Start by uploading your first document!</div>
                    </div>
                `;
                return;
            }
            
            const documentsHTML = documents.map(doc => {
                const timestamp = doc.uploaded_at || doc.uploadedAt || doc.created_at;
                const date = new Date(timestamp).toLocaleDateString();
                const size = formatFileSize(doc.size);
                
                return `
                    <div class="document-item">
                        <div class="document-info">
                            <div class="document-name">📄 ${escapeHtml(doc.filename)}</div>
                            <div class="document-meta">
                                <span class="document-size">${size}</span>
                                <span class="document-date">Uploaded on ${date}</span>
                            </div>
                        </div>
                        <div class="document-actions">
                            <button class="btn btn-download" data-id="${escapeHtml(doc.id)}" data-filename="${escapeHtml(doc.filename)}">Download</button>
                            <button class="btn btn-delete" data-id="${escapeHtml(doc.id)}">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            listContainer.innerHTML = documentsHTML;

            // Attach event listeners
            listContainer.querySelectorAll('.btn-download').forEach(btn => {
                btn.addEventListener('click', () => {
                    const docId = btn.getAttribute('data-id');
                    const filename = btn.getAttribute('data-filename');
                    downloadDocument(docId, filename);
                });
            });

            listContainer.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', () => {
                    const docId = btn.getAttribute('data-id');
                    deleteDocument(docId);
                });
            });
        }
        
        // Update statistics
        function updateStats() {
            const totalDocs = documents.length;
            const totalBytes = documents.reduce((sum, doc) => sum + (doc.size || 0), 0);
            const totalSize = formatFileSize(totalBytes);
            
            // Count documents uploaded in last 24 hours
            const now = Date.now();
            const oneDayMs = 24 * 60 * 60 * 1000;
            const recentCount = documents.filter(doc => {
                const timestamp = doc.uploaded_at || doc.uploadedAt || doc.created_at;
                const uploadTime = new Date(timestamp).getTime();
                return (now - uploadTime) < oneDayMs;
            }).length;
            
            document.getElementById('totalDocuments').textContent = totalDocs;
            document.getElementById('totalSize').textContent = totalSize;
            document.getElementById('recentCount').textContent = recentCount;
        }
        
        // Setup upload area
        function setupUploadArea() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            
            // Click to upload
            uploadArea.addEventListener('click', (e) => {
                // Prevent duplicate click if clicking on the label or input directly
                if (e.target !== fileInput && !e.target.closest('.file-input-label')) {
                    fileInput.click();
                }
            });
            
            // Drag and drop
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                
                if (e.dataTransfer.files.length > 0) {
                    fileInput.files = e.dataTransfer.files;
                    handleFileSelect();
                }
            });
            
            // File input change
            fileInput.addEventListener('change', handleFileSelect);
        }
        
        // Handle file selection
        function handleFileSelect() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (file) {
                uploadFile(file);
            }
        }
        
        // Upload file
        async function uploadFile(file) {
            const maxSize = 100 * 1024 * 1024; // 100MB limit
            
            if (file.size > maxSize) {
                showAlert(`File too large. Maximum size is ${formatFileSize(maxSize)}.`, 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            const uploadProgress = document.getElementById('uploadProgress');
            const progressFill = document.getElementById('progressFill');
            const uploadStatus = document.getElementById('uploadStatus');
            
            uploadProgress.style.display = 'block';
            uploadStatus.textContent = 'Uploading...';
            
            try {
                const xhr = new XMLHttpRequest();
                
                // Track upload progress
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = (e.loaded / e.total) * 100;
                        progressFill.style.width = percentComplete + '%';
                        uploadStatus.textContent = `Uploading: ${percentComplete.toFixed(0)}%`;
                    }
                });
                
                xhr.addEventListener('load', async () => {
                    if (xhr.status === 200 || xhr.status === 201) {
                        uploadStatus.textContent = 'Upload complete!';
                        progressFill.style.width = '100%';
                        showAlert(`Document "${file.name}" uploaded successfully!`, 'success');
                        
                        // Reset file input
                        document.getElementById('fileInput').value = '';
                        
                        // Reload documents after a short delay
                        setTimeout(() => {
                            uploadProgress.style.display = 'none';
                            loadDocuments();
                        }, 1000);
                    } else {
                        const errorMessage = xhr.responseText || 'Upload failed';
                        showAlert(errorMessage, 'error');
                        uploadProgress.style.display = 'none';
                    }
                });
                
                xhr.addEventListener('error', () => {
                    showAlert('Upload failed: ' + xhr.statusText, 'error');
                    uploadProgress.style.display = 'none';
                });
                
                xhr.addEventListener('abort', () => {
                    showAlert('Upload cancelled', 'info');
                    uploadProgress.style.display = 'none';
                });
                
                xhr.open('POST', `${API_BASE}/api/documents/upload`, true);
                xhr.withCredentials = true;
                xhr.send(formData);
            } catch (error) {
                showAlert('Error uploading file: ' + error.message, 'error');
                uploadProgress.style.display = 'none';
            }
        }
        
        // Download document
        async function downloadDocument(docId, filename) {
            try {
                const link = document.createElement('a');
                link.href = `${API_BASE}/api/documents/${docId}/download`;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (error) {
                showAlert('Error downloading file: ' + error.message, 'error');
            }
        }
        
        // Delete document
        async function deleteDocument(docId) {
            if (!confirm('Are you sure you want to delete this document? This action cannot be undone.')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/documents/${docId}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                
                if (response.ok) {
                    showAlert('Document deleted successfully', 'success');
                    loadDocuments();
                } else if (response.status === 401) {
                    window.location.href = '/';
                } else {
                    const errorMessage = await response.text();
                    showAlert(errorMessage || 'Failed to delete document', 'error');
                }
            } catch (error) {
                showAlert('Error deleting document: ' + error.message, 'error');
            }
        }
        
        // Show alert
        function showAlert(message, type = 'info') {
            const alertsContainer = document.getElementById('alerts');
            const alertId = 'alert-' + Date.now();
            
            const alertHTML = `
                <div class="alert alert-${type}" id="${alertId}">
                    ${escapeHtml(message)}
                </div>
            `;
            
            alertsContainer.insertAdjacentHTML('beforeend', alertHTML);
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                const alert = document.getElementById(alertId);
                if (alert) {
                    alert.remove();
                }
            }, 5000);
        }
        
        // Utility functions
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }
        
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            setupUploadArea();
            initializePage();
        });
        
        // Refresh documents every 30 seconds
        setInterval(loadDocuments, 30000);
    </script>
</body>
</html>
